<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | S. van Wijk Solutions</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="contact-page">
        <section class="container reveal">
            <div class="section-header">
                <h1>Laten we samenwerken</h1>
                <p>Klaar voor een website die echt werkt? Neem contact met ons op.</p>
            </div>
            
            <div class="contact-split">
                <!-- Links: Map -->
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d156434.84239849204!2d4.743949!3d52.284242!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c609c3db074b65%3A0x86915038ee823126!2sAmsterdam!5e0!3m2!1snl!2snl!4v1700000000000" 
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>

                <!-- Rechts: Formulier -->
                <div class="contact-form-wrapper">
                    <form action="https://formspree.io/f/jouw-id" method="POST" class="contact-form">
                        <div class="form-group">
                            <label>Naam</label>
                            <input type="text" name="name" required placeholder="Jouw naam">
                        </div>
                        <div class="form-group">
                            <label>E-mail</label>
                            <input type="email" name="email" required placeholder="je@email.nl">
                        </div>
                        <div class="form-group">
                            <label>Bericht</label>
                            <textarea name="message" rows="5" required placeholder="Wat kunnen we voor je betekenen?"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Verstuur Bericht</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
